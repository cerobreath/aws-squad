<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="checkout (template1, step)"
  th:replace="~{fragments/layout :: layout (~{::body},'checkout')}"
>
  <body>
    <section class="max-w-4xl mx-auto px-4 py-8">
      <!-- Progress Bar -->
      <div class="mb-8 mx-16">
        <div class="flex items-center justify-between relative">
          <!-- Step 1: Deployment Coordinates -->
          <div class="step-item flex flex-col items-center">
            <div
              class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white"
            >
              <i class="fas fa-location-crosshairs"></i>
            </div>
            <div
              class="text-sm font-medium mt-2 text-primary-500"
              th:text="#{checkout.shippingaddress}"
            >
              Deployment
            </div>
          </div>

          <!-- Step 2: Warp Transit -->
          <div class="step-item flex flex-col items-center">
            <div
              class="w-10 h-10 rounded-full flex items-center justify-center"
              th:classappend="${step >= 2} ? 'bg-primary-500 text-white' : ''"
              th:styleappend="${step < 2} ? 'background-color: #2a2a4e; color: #7a6a4a;' : ''"
            >
              <i class="fas fa-rocket"></i>
            </div>
            <div
              class="text-sm font-medium mt-2"
              th:classappend="${step >= 2} ? 'text-primary-500' : ''"
              th:styleappend="${step < 2} ? 'color: #7a6a4a;' : ''"
              th:text="#{checkout.delivery}"
            >
              Transit
            </div>
          </div>

          <!-- Step 3: Tithe Payment -->
          <div class="step-item flex flex-col items-center">
            <div
              class="w-10 h-10 rounded-full flex items-center justify-center"
              th:classappend="${step >= 3} ? 'bg-primary-500 text-white' : ''"
              th:styleappend="${step < 3} ? 'background-color: #2a2a4e; color: #7a6a4a;' : ''"
            >
              <i class="fas fa-coins"></i>
            </div>
            <div
              class="text-sm font-medium mt-2"
              th:classappend="${step >= 3} ? 'text-primary-500' : ''"
              th:styleappend="${step < 3} ? 'color: #7a6a4a;' : ''"
              th:text="#{checkout.payment}"
            >
              Tithe
            </div>
          </div>
        </div>
      </div>

      <div
        class="p-4 rounded mb-4"
        role="alert"
        style="background-color: rgba(184, 134, 11, 0.1); border-left: 4px solid #b8860b;"
        th:if="${!disableDemoWarnings}"
      >
        <p class="font-bold" style="color: #daa520;">
          <i class="fas fa-exclamation-triangle mr-2"></i>Imperial Edict
        </p>
        <p style="color: #b8a88a;">
          This site is for demonstration/educational purposes only — do not enter personal details
        </p>
      </div>

      <!-- Form Container -->
      <div>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-8">
          <!-- Existing form - make it span 2 columns -->
          <div class="md:col-span-3">
            <th:block th:insert="${template1}" />
          </div>
          <!-- Order Summary Column -->
          <div class="md:col-span-2">
            <div class="p-6 text-sm rounded-lg" style="background-color: #0f1629; border: 1px solid rgba(184, 134, 11, 0.2);">
              <dl>
                <dt style="color: #9a8a6a;">Amount Due to the Imperium</dt>
                <dd class="text-2xl mt-2 mb-4" style="color: #daa520;">
                  $<th:block th:text="${checkout.total}">446</th:block>
                </dd>
              </dl>

              <dl
                class="mt-6 pt-2 space-y-2"
                style="border-top: 1px solid rgba(184, 134, 11, 0.2);"
              >
                <div class="flex items-center justify-between py-2">
                  <dt style="color: #9a8a6a;">Subtotal</dt>
                  <dd style="color: #b8a88a;">
                    $<th:block th:text="${checkout.subtotal}">446</th:block>
                  </dd>
                </div>
                <div
                  class="flex items-center justify-between py-2"
                  th:if="${checkout.tax > 0}"
                >
                  <dt style="color: #9a8a6a;">Imperial Tithe</dt>
                  <dd style="color: #b8a88a;">$<th:block th:text="${checkout.tax}">446</th:block></dd>
                </div>
                <div
                  class="flex items-center justify-between py-2"
                  th:if="${checkout.shipping > 0}"
                >
                  <dt style="color: #9a8a6a;">Warp Transit Fee</dt>
                  <dd style="color: #b8a88a;">
                    $<th:block th:text="${checkout.shipping}">446</th:block>
                  </dd>
                </div>
                <div
                  class="flex items-center justify-between py-2 mt-4 pt-4"
                  style="border-top: 1px solid rgba(184, 134, 11, 0.2);"
                >
                  <dt class="text-lg" style="color: #e8d9b0;">Total</dt>
                  <dd class="text-lg" style="color: #daa520;">
                    $<th:block th:text="${checkout.total}">446</th:block>
                  </dd>
                </div>
              </dl>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
