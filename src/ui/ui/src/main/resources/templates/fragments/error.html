<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="error (code)"
  th:replace="~{fragments/root :: root (~{::body})}"
>
  <body>
    <div class="min-h-screen flex items-center justify-center" style="background: radial-gradient(ellipse at center, #12121e 0%, #0a0a12 100%);">
      <!-- Warp rift background effect -->
      <div class="absolute inset-0 warp-rift" style="opacity: 0.3;"></div>

      <div class="text-center relative z-10">
        <!-- Aquila broken -->
        <div class="mb-6">
          <svg width="100" height="50" viewBox="0 0 200 100" style="margin: 0 auto; display: block; opacity: 0.3;">
            <path d="M100 10 L70 35 L10 25 L40 50 L10 75 L70 65 L100 90 L130 65 L190 75 L160 50 L190 25 L130 35 Z" fill="#8b0000"/>
          </svg>
        </div>

        <!-- Error code -->
        <h1 class="font-bold mb-2" th:text="${code}" style="color: #8b0000; font-family: 'Cinzel Decorative', serif; font-size: 7rem; text-shadow: 0 0 40px rgba(139, 0, 0, 0.4), 0 0 80px rgba(139, 0, 0, 0.2);">404</h1>

        <!-- Skull separator -->
        <div class="flex items-center justify-center gap-4 mb-4" style="opacity: 0.4;">
          <div style="width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #8b0000);"></div>
          <span style="color: #8b0000;">&#9760;</span>
          <div style="width: 60px; height: 1px; background: linear-gradient(90deg, #8b0000, transparent);"></div>
        </div>

        <p class="text-xl mb-2" style="color: #e8d9b0; font-family: 'Cinzel', serif; letter-spacing: 0.1em;">
          <span style="color: #cc1111;">HERESY DETECTED</span>
        </p>
        <p class="text-sm mb-2" style="color: #5a4a2a; font-style: italic; max-width: 400px; margin: 0 auto;">
          The Inquisition has been notified. This sector has been purged from Imperial records.
        </p>
        <p class="text-xs mb-8" style="color: #3a2a1a;">
          ++ Thought for the day: Innocence proves nothing ++
        </p>

        <a
          th:href="@{/home}"
          class="inline-flex items-center gap-2 px-8 py-3 text-white rounded-lg btn-imperial transition-colors"
        >
          <i class="fas fa-shield-halved"></i>
          Return to Sanctum
        </a>
      </div>
    </div>
  </body>
</html>
