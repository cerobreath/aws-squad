<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="error (code)"
  th:replace="~{fragments/root :: root (~{::body})}"
>
  <body>
    <div class="min-h-screen flex items-center justify-center" style="background: radial-gradient(ellipse at center, #12121e 0%, #0a0a12 100%);">
      <div class="text-center">
        <!-- Aquila -->
        <div class="mb-6">
          <svg width="80" height="40" viewBox="0 0 200 100" style="margin: 0 auto; display: block; opacity: 0.3;">
            <path d="M100 10 L70 35 L10 25 L40 50 L10 75 L70 65 L100 90 L130 65 L190 75 L160 50 L190 25 L130 35 Z" fill="#8b0000"/>
          </svg>
        </div>
        <h1 class="font-bold mb-4" th:text="${code}" style="color: #8b0000; font-family: 'Cinzel Decorative', serif; font-size: 6rem; text-shadow: 0 0 30px rgba(139, 0, 0, 0.3);">404</h1>
        <p class="text-xl mb-2" style="color: #e8d9b0; font-family: 'Cinzel', serif;">
          <span style="color: #cc1111;">HERESY DETECTED</span>
        </p>
        <p class="text-sm mb-8" style="color: #5a4a2a; font-style: italic;">
          The Inquisition has been notified. This sector has been purged.
        </p>
        <a
          th:href="@{/home}"
          class="inline-block px-8 py-3 text-white rounded-lg btn-imperial transition-colors"
        >Return to Sanctum</a>
      </div>
    </div>
  </body>
</html>
