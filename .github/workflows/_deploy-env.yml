name: Deploy Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      cluster_name:
        required: true
        type: string
      vpc_id:
        required: true
        type: string
      lb_controller_role_arn:
        required: true
        type: string
      origin_acm_certificate_arn:
        required: true
        type: string
      argocd_acm_certificate_arn:
        required: true
        type: string
      grafana_acm_certificate_arn:
        required: true
        type: string
      hostname:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      ARGOCD_ADMIN_PASSWORD:
        required: true
      GRAFANA_ADMIN_PASSWORD:
        required: true

jobs:
  deploy:
    name: "Deploy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ inputs.aws_region }} \
            --name ${{ inputs.cluster_name }}

      - name: Install kubeseal
        run: |
          KUBESEAL_VERSION="0.28.0"
          curl -fsSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeseal

      - name: Install ArgoCD
        run: |
          sudo apt-get install -y apache2-utils > /dev/null 2>&1
          BCRYPT_HASH=$(htpasswd -nbBC 10 "" '${{ secrets.ARGOCD_ADMIN_PASSWORD }}' | tr -d ':\n' | sed 's/$2y/$2a/')
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --values k8s/argocd/values.yaml \
            --set "configs.secret.argocdServerAdminPassword=${BCRYPT_HASH}" \
            --set "server.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-ssl-cert=${{ inputs.argocd_acm_certificate_arn }}" \
            --set "server.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-ssl-ports=443" \
            --timeout 5m

      - name: Wait for ArgoCD to be ready
        run: |
          echo "Waiting for ArgoCD components..."
          kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=3m
          kubectl rollout status deployment/argocd-server -n argocd --timeout=3m
          kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=3m
          echo "ArgoCD is ready"

      - name: Apply Sealed Secrets Application
        run: |
          helm template sealed-secrets-app \
            k8s/argocd/applications/sealed-secrets \
            --namespace argocd | kubectl apply -f -

      - name: Wait for Sealed Secrets controller
        run: |
          echo "Waiting for Sealed Secrets controller..."
          for i in $(seq 1 90); do
            READY=$(kubectl get deployment -n kube-system sealed-secrets -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "$READY" = "1" ]; then
              echo "Sealed Secrets controller is ready"
              exit 0
            fi
            echo "  attempt $i/90 — not ready yet"
            sleep 5
          done
          echo "ERROR: Sealed Secrets controller did not become ready in time"
          kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets
          exit 1

      - name: Create Cloudflare SealedSecret
        run: |
          kubectl create secret generic cloudflare-api-token \
            --namespace kube-system \
            --from-literal=api-token=${{ secrets.CLOUDFLARE_API_TOKEN }} \
            --dry-run=client -o yaml \
          | kubeseal \
              --controller-name=sealed-secrets \
              --controller-namespace=kube-system \
              --format yaml \
          | kubectl apply -f -

      - name: Deploy ArgoCD Applications
        run: |
          helm template lb-controller-app \
            k8s/argocd/applications/lb-controller \
            --namespace argocd \
            --set clusterName=${{ inputs.cluster_name }} \
            --set awsRegion=${{ inputs.aws_region }} \
            --set vpcId=${{ inputs.vpc_id }} \
            --set lbControllerRoleArn=${{ inputs.lb_controller_role_arn }} \
            | kubectl apply -f -

          helm template external-dns-app \
            k8s/argocd/applications/external-dns \
            --namespace argocd | kubectl apply -f -

          helm template kube-prometheus-stack-app \
            k8s/argocd/applications/kube-prometheus-stack \
            --namespace argocd \
            --set grafana.acmCertificateArn=${{ inputs.grafana_acm_certificate_arn }} \
            --set grafana.adminPassword=${{ secrets.GRAFANA_ADMIN_PASSWORD }} \
            | kubectl apply -f -

          helm template retail-store-app \
            k8s/argocd/applications/retail-store \
            --namespace argocd \
            --set acmCertificateArn=${{ inputs.origin_acm_certificate_arn }} \
            --set hostname=${{ inputs.hostname }} \
            | kubectl apply -f -

          helm template root-app \
            k8s/argocd/applications/root \
            --namespace argocd | kubectl apply -f -

      - name: Wait for all applications to sync
        run: |
          echo "Waiting for ArgoCD applications to sync..."
          for i in $(seq 1 60); do
            SYNCED=$(kubectl get applications -n argocd -o jsonpath='{range .items[*]}{.status.sync.status}{"\n"}{end}' 2>/dev/null | grep -c "Synced" || echo "0")
            TOTAL=$(kubectl get applications -n argocd --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "  attempt $i/60 — $SYNCED/$TOTAL synced"
            if [ "$TOTAL" -gt 0 ] && [ "$SYNCED" = "$TOTAL" ]; then
              echo "All applications synced"
              break
            fi
            sleep 10
          done
          kubectl get applications -n argocd

      - name: Print ArgoCD access info
        run: |
          echo "::notice::ArgoCD user: admin"
          echo "::notice::Password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
          ARGOCD_LB=""
          for i in $(seq 1 30); do
            ARGOCD_LB=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ARGOCD_LB" ]; then
              echo "::notice::ArgoCD UI: https://argocd.shop.whiteforge.ai"
              break
            fi
            sleep 10
          done
