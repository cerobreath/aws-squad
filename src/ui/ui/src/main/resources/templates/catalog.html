<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'catalog')}"
>
  <body>
    <section class="max-w-5xl mx-auto px-4 py-10">
      <div class="flex flex-col md:flex-row gap-10">
        <!-- Sidebar -->
        <div class="w-full md:w-40 h-fit" style="border-right: 1px solid rgba(184, 134, 11, 0.15); padding-right: 1.5rem;">
          <h3 class="font-semibold mb-5 uppercase text-xs" style="color: #daa520; font-family: 'Cinzel', serif; letter-spacing: 0.15em;">
            Categories
          </h3>
          <ul class="space-y-2 text-sm category-menu">
            <li>
              <a href="#" class="block py-1.5" style="color: #b8a88a;" th:href="@{/catalog(page=1)}">All Requisitions</a>
            </li>
            <li th:each="tag : ${tags}">
              <a href="#" class="block py-1.5" style="color: #b8a88a;" th:text="${tag.displayName}" th:href="@{/catalog(page=1,tag=${tag.name})}">Category</a>
            </li>
          </ul>
        </div>

        <!-- Product Grid -->
        <div class="flex-1">
          <div>
            <div class="text-center mb-6 text-xs" style="color: #5a4a2a; font-style: italic;" th:if="${!disableDemoWarnings}">
              ++ By order of the Inquisition: These items are for demonstration purposes only ++
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-6">
              <div th:each="item : ${catalog.products}">
                <div th:replace="~{fragments/product_card :: card(${item}) }"></div>
              </div>
            </div>
          </div>
          <!-- Pagination -->
          <div class="flex justify-center mt-10">
            <nav
              class="inline-flex items-center rounded-lg pagination"
              aria-label="Pagination"
              th:with="prevIndex=${{catalog.page == 1} ? 1: catalog.page-1}, nextIndex=${{catalog.page == catalog.totalPages} ? catalog.totalPages: catalog.page+1}"
            >
              <a href="#" th:href="@{/catalog(page=${prevIndex},tag=${selectedTag})}">
                <button class="inline-flex items-center justify-center w-10 h-10" style="border-right: 1px solid rgba(184, 134, 11, 0.2); color: #b8a88a;">
                  <i class="fas fa-chevron-left text-xs"></i>
                </button>
              </a>
              <a href="#" th:each="i : ${#numbers.sequence(1, catalog.totalPages)}" th:href="@{/catalog(page=${i},tag=${selectedTag})}">
                <button
                  class="inline-flex items-center justify-center w-10 h-10"
                  th:classappend="${i == catalog.page} ? 'bg-primary-500 text-white' : ''"
                  th:styleappend="${i != catalog.page} ? 'color: #b8a88a;' : ''"
                  style="border-right: 1px solid rgba(184, 134, 11, 0.2);"
                  th:text="${i}"
                >1</button>
              </a>
              <a href="#" th:href="@{/catalog(page=${nextIndex},tag=${selectedTag})}">
                <button class="inline-flex items-center justify-center w-10 h-10" style="color: #b8a88a;">
                  <i class="fas fa-chevron-right text-xs"></i>
                </button>
              </a>
            </nav>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
