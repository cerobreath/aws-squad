apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 8.2.0
    helm:
      releaseName: velero
      valuesObject:
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.11.0
            volumeMounts:
              - mountPath: /target
                name: plugins
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: {{ .Values.velero.bucketName }}
              config:
                region: {{ .Values.velero.awsRegion }}
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: {{ .Values.velero.awsRegion }}
        serviceAccount:
          server:
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.velero.roleArn }}
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        schedules:
          daily-backup:
            disabled: false
            schedule: "0 2 * * *"
            template:
              ttl: 720h
              includedNamespaces:
                - retail-store
                - monitoring
              snapshotVolumes: true
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
