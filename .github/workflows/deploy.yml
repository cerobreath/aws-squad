name: Deploy

on:
  push:
    branches: [main, staging]
    paths:
      - "k8s/**"
      - "terraform/**"
      - "src/ui/**"
      - "src/catalog/**"
      - "src/checkout/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [staging, production]
        default: staging

env:
  AWS_REGION: eu-central-1

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # STAGING  (branch: staging)
  # ---------------------------------------------------------------------------
  terraform-staging:
    if: github.ref == 'refs/heads/staging' || inputs.environment == 'staging'
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: staging
      workspace: staging
      tfvars: envs/staging.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  build-ui-staging:
    if: github.ref == 'refs/heads/staging' || inputs.environment == 'staging'
    needs: [terraform-staging]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/ui
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_frontend_url }}
      cache_scope: ui
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-catalog-staging:
    if: github.ref == 'refs/heads/staging' || inputs.environment == 'staging'
    needs: [terraform-staging]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/catalog
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_catalog_url }}
      cache_scope: catalog
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-checkout-staging:
    if: github.ref == 'refs/heads/staging' || inputs.environment == 'staging'
    needs: [terraform-staging]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/checkout
      ecr_url: ${{ needs.terraform-staging.outputs.ecr_checkout_url }}
      cache_scope: checkout
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-staging:
    needs: [terraform-staging, build-ui-staging, build-catalog-staging, build-checkout-staging]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-staging.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-staging.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-staging.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-staging.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn: ${{ needs.terraform-staging.outputs.argocd_acm_certificate_arn }}
      grafana_acm_certificate_arn: ${{ needs.terraform-staging.outputs.grafana_acm_certificate_arn }}
      hostname: origin-staging.shop.whiteforge.ai
      ui_image: ${{ needs.terraform-staging.outputs.ecr_frontend_url }}
      ui_tag: ${{ needs.build-ui-staging.outputs.image_tag }}
      cluster_autoscaler_role_arn: ${{ needs.terraform-staging.outputs.cluster_autoscaler_role_arn }}
      velero_bucket_name: ${{ needs.terraform-staging.outputs.velero_bucket_name }}
      velero_role_arn: ${{ needs.terraform-staging.outputs.velero_role_arn }}
      argocd_hostname: ${{ needs.terraform-staging.outputs.argocd_hostname }}
      grafana_hostname: ${{ needs.terraform-staging.outputs.grafana_hostname }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # ---------------------------------------------------------------------------
  # PRODUCTION  (branch: main)
  # ---------------------------------------------------------------------------
  terraform-production:
    if: github.ref == 'refs/heads/main' || inputs.environment == 'production'
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: production
      workspace: production
      tfvars: envs/production.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  build-ui-production:
    if: github.ref == 'refs/heads/main' || inputs.environment == 'production'
    needs: [terraform-production]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/ui
      ecr_url: ${{ needs.terraform-production.outputs.ecr_frontend_url }}
      cache_scope: ui
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-catalog-production:
    if: github.ref == 'refs/heads/main' || inputs.environment == 'production'
    needs: [terraform-production]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/catalog
      ecr_url: ${{ needs.terraform-production.outputs.ecr_catalog_url }}
      cache_scope: catalog
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-checkout-production:
    if: github.ref == 'refs/heads/main' || inputs.environment == 'production'
    needs: [terraform-production]
    uses: ./.github/workflows/_build-image.yml
    with:
      context: src/checkout
      ecr_url: ${{ needs.terraform-production.outputs.ecr_checkout_url }}
      cache_scope: checkout
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-production:
    needs: [terraform-production, build-ui-production, build-catalog-production, build-checkout-production]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-production.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-production.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-production.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-production.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn: ${{ needs.terraform-production.outputs.argocd_acm_certificate_arn }}
      grafana_acm_certificate_arn: ${{ needs.terraform-production.outputs.grafana_acm_certificate_arn }}
      hostname: origin.shop.whiteforge.ai
      ui_image: ${{ needs.terraform-production.outputs.ecr_frontend_url }}
      ui_tag: ${{ needs.build-ui-production.outputs.image_tag }}
      cluster_autoscaler_role_arn: ${{ needs.terraform-production.outputs.cluster_autoscaler_role_arn }}
      velero_bucket_name: ${{ needs.terraform-production.outputs.velero_bucket_name }}
      velero_role_arn: ${{ needs.terraform-production.outputs.velero_role_arn }}
      argocd_hostname: ${{ needs.terraform-production.outputs.argocd_hostname }}
      grafana_hostname: ${{ needs.terraform-production.outputs.grafana_hostname }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}