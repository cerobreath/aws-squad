<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/checkout :: checkout (~{::body}, 1)}"
>
  <body>
    <form
      th:object="${shippingAddressRequest}"
      method="POST"
      id="checkoutForm"
      th:action="@{/checkout}"
    >
      <h2 class="text-2xl font-bold mb-6" th:text="#{checkout.shippingaddress}" style="color: #daa520; font-family: 'Cinzel', serif;">
        Deployment Coordinates
      </h2>

      <div class="space-y-6">
        <!-- Name Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label
              for="firstName"
              class="block text-sm font-medium mb-1"
              style="color: #b8a88a;"
              >Given Name</label
            >
            <input
              type="text"
              id="firstName"
              name="firstName"
              th:value="*{firstName}"
              class="w-full px-3 py-2 rounded-md focus:outline-none"
              th:classappend="${#fields.hasErrors('firstName')} ? border-red-500 : ''"
            />
            <div
              class="text-sm" style="color: #8b0000;"
              th:if="${#fields.hasErrors('firstName')}"
              th:errors="*{firstName}"
            >
              Validation.
            </div>
          </div>
          <div>
            <label
              for="lastName"
              class="block text-sm font-medium mb-1"
              style="color: #b8a88a;"
              >House Name</label
            >
            <input
              type="text"
              id="lastName"
              name="lastName"
              th:value="*{lastName}"
              class="w-full px-3 py-2 rounded-md focus:outline-none"
              th:classappend="${#fields.hasErrors('lastName')} ? border-red-500 : ''"
            />
            <div
              class="text-sm" style="color: #8b0000;"
              th:if="${#fields.hasErrors('lastName')}"
              th:errors="*{lastName}"
            >
              Validation.
            </div>
          </div>
        </div>

        <!-- Address Fields -->
        <div>
          <label
            for="streetAddress"
            class="block text-sm font-medium mb-1"
            style="color: #b8a88a;"
            >Hive Sector / Hab-Block</label
          >
          <input
            type="text"
            id="streetAddress"
            name="streetAddress"
            th:value="*{address1}"
            class="w-full px-3 py-2 rounded-md focus:outline-none"
            th:classappend="${#fields.hasErrors('address1')} ? border-red-500 : ''"
          />
          <div
            class="text-sm" style="color: #8b0000;"
            th:if="${#fields.hasErrors('address1')}"
            th:errors="*{address1}"
          >
            Validation.
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label
              for="city"
              class="block text-sm font-medium mb-1"
              style="color: #b8a88a;"
              >Hive City / Fortress</label
            >
            <input
              type="text"
              id="city"
              name="city"
              th:value="*{city}"
              class="w-full px-3 py-2 rounded-md focus:outline-none"
              th:classappend="${#fields.hasErrors('city')} ? border-red-500 : ''"
            />
            <div
              class="text-sm" style="color: #8b0000;"
              th:if="${#fields.hasErrors('city')}"
              th:errors="*{city}"
            >
              Validation.
            </div>
          </div>
          <div>
            <label
              for="state"
              class="block text-sm font-medium mb-1"
              style="color: #b8a88a;"
              >Segmentum / Subsector</label
            >
            <input
              type="text"
              id="state"
              name="state"
              th:value="*{state}"
              class="w-full px-3 py-2 rounded-md focus:outline-none"
              th:classappend="${#fields.hasErrors('state')} ? border-red-500 : ''"
            />
            <div
              class="text-sm" style="color: #8b0000;"
              th:if="${#fields.hasErrors('state')}"
              th:errors="*{state}"
            >
              Validation.
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label
              for="zipCode"
              class="block text-sm font-medium mb-1"
              style="color: #b8a88a;"
              >Planet Code</label
            >
            <input
              type="text"
              id="zipCode"
              name="zipCode"
              th:value="*{zipCode}"
              class="w-full px-3 py-2 rounded-md focus:outline-none"
              th:classappend="${#fields.hasErrors('zipCode')} ? border-red-500 : ''"
            />
            <div
              class="text-sm" style="color: #8b0000;"
              th:if="${#fields.hasErrors('zipCode')}"
              th:errors="*{zipCode}"
            >
              Validation.
            </div>
          </div>
          <div></div>
        </div>
        <div>
          <label
            for="email"
            class="block text-sm font-medium mb-1"
            style="color: #b8a88a;"
            >Astropathic Address</label
          >
          <input
            type="text"
            id="email"
            name="email"
            th:value="*{email}"
            class="w-full px-3 py-2 rounded-md focus:outline-none"
            th:classappend="${#fields.hasErrors('email')} ? border-red-500 : ''"
          />
          <div
            class="text-sm" style="color: #8b0000;"
            th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}"
          >
            Validation.
          </div>
        </div>
      </div>

      <div class="mt-8 flex justify-end">
        <button
          id="checkout-submit"
          type="submit"
          class="px-6 py-2 bg-primary-500 text-white rounded-md hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
          style="border: 1px solid rgba(184, 134, 11, 0.3);"
        >
          Advance
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </form>
  </body>
</html>
