apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ui-pdb
  namespace: retail-store
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: retail-store
      app.kubernetes.io/name: ui
