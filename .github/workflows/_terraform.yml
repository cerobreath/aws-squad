name: Terraform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      workspace:
        required: true
        type: string
      tfvars:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
    outputs:
      cluster_name:
        value: ${{ jobs.terraform.outputs.cluster_name }}
      aws_region:
        value: ${{ jobs.terraform.outputs.aws_region }}
      vpc_id:
        value: ${{ jobs.terraform.outputs.vpc_id }}
      lb_controller_role_arn:
        value: ${{ jobs.terraform.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn:
        value: ${{ jobs.terraform.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn:
        value: ${{ jobs.terraform.outputs.argocd_acm_certificate_arn }}
      grafana_acm_certificate_arn:
        value: ${{ jobs.terraform.outputs.grafana_acm_certificate_arn }}
      ecr_frontend_url:
        value: ${{ jobs.terraform.outputs.ecr_frontend_url }}
      ecr_catalog_url:
        value: ${{ jobs.terraform.outputs.ecr_catalog_url }}
      ecr_checkout_url:
        value: ${{ jobs.terraform.outputs.ecr_checkout_url }}
      cluster_autoscaler_role_arn:
        value: ${{ jobs.terraform.outputs.cluster_autoscaler_role_arn }}
      velero_bucket_name:
        value: ${{ jobs.terraform.outputs.velero_bucket_name }}
      velero_role_arn:
        value: ${{ jobs.terraform.outputs.velero_role_arn }}
      argocd_hostname:
        value: ${{ jobs.terraform.outputs.argocd_hostname }}
      grafana_hostname:
        value: ${{ jobs.terraform.outputs.grafana_hostname }}

jobs:
  terraform:
    name: "Terraform (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      cluster_name: ${{ steps.tf.outputs.cluster_name }}
      aws_region: ${{ steps.tf.outputs.aws_region }}
      vpc_id: ${{ steps.tf.outputs.vpc_id }}
      lb_controller_role_arn: ${{ steps.tf.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ steps.tf.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn: ${{ steps.tf.outputs.argocd_acm_certificate_arn }}
      grafana_acm_certificate_arn: ${{ steps.tf.outputs.grafana_acm_certificate_arn }}
      ecr_frontend_url: ${{ steps.tf.outputs.ecr_frontend_url }}
      ecr_catalog_url: ${{ steps.tf.outputs.ecr_catalog_url }}
      ecr_checkout_url: ${{ steps.tf.outputs.ecr_checkout_url }}
      cluster_autoscaler_role_arn: ${{ steps.tf.outputs.cluster_autoscaler_role_arn }}
      velero_bucket_name: ${{ steps.tf.outputs.velero_bucket_name }}
      velero_role_arn: ${{ steps.tf.outputs.velero_role_arn }}
      argocd_hostname: ${{ steps.tf.outputs.argocd_hostname }}
      grafana_hostname: ${{ steps.tf.outputs.grafana_hostname }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          terraform init
          terraform workspace select ${{ inputs.workspace }} || terraform workspace new ${{ inputs.workspace }}
          terraform apply -auto-approve -var-file=${{ inputs.tfvars }}

      - name: Export outputs
        id: tf
        working-directory: terraform
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "vpc_id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"
          echo "lb_controller_role_arn=$(terraform output -raw aws_lb_controller_role_arn)" >> "$GITHUB_OUTPUT"
          echo "origin_acm_certificate_arn=$(terraform output -raw origin_acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "argocd_acm_certificate_arn=$(terraform output -raw argocd_acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "grafana_acm_certificate_arn=$(terraform output -raw grafana_acm_certificate_arn)" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_url=$(terraform output -raw ecr_frontend_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_catalog_url=$(terraform output -raw ecr_catalog_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_checkout_url=$(terraform output -raw ecr_checkout_url)" >> "$GITHUB_OUTPUT"
          echo "cluster_autoscaler_role_arn=$(terraform output -raw cluster_autoscaler_role_arn)" >> "$GITHUB_OUTPUT"
          echo "velero_bucket_name=$(terraform output -raw velero_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "velero_role_arn=$(terraform output -raw velero_role_arn)" >> "$GITHUB_OUTPUT"
          echo "argocd_hostname=$(terraform output -raw argocd_hostname)" >> "$GITHUB_OUTPUT"
          echo "grafana_hostname=$(terraform output -raw grafana_hostname)" >> "$GITHUB_OUTPUT"
