apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 72.6.2
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        # --- Prometheus Operator ---
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

        # --- Prometheus ---
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: gp2

        # --- Custom recording rules ---
        additionalPrometheusRulesMap:
          node-metrics.rules:
            groups:
              - name: node-metrics
                interval: 30s
                rules:
                  - record: node:cpu_idle:percent
                    expr: |
                      avg by (instance) (
                        rate(node_cpu_seconds_total{mode="idle"}[5m])
                      ) * 100
                  - record: node:memory_available:bytes
                    expr: |
                      node_memory_MemAvailable_bytes
                  - record: node:filesystem_root_avail:percent
                    expr: |
                      (
                        node_filesystem_avail_bytes{mountpoint="/", fstype!="", device!~"rootfs"}
                        /
                        node_filesystem_size_bytes{mountpoint="/", fstype!="", device!~"rootfs"}
                      ) * 100
              - name: cluster-health
                interval: 30s
                rules:
                  - record: cluster:node_memory_available:percent
                    expr: |
                      (
                        sum(node_memory_MemAvailable_bytes)
                        /
                        clamp_min(sum(node_memory_MemTotal_bytes), 1)
                      ) * 100
                  - record: cluster:pod_capacity_utilization:percent
                    expr: |
                      (
                        sum(kube_pod_status_phase{phase=~"Pending|Running"} == 1)
                        /
                        clamp_min(sum(kube_node_status_capacity{resource="pods"}), 1)
                      ) * 100
                  - record: cluster:pods_pending:count
                    expr: |
                      sum(kube_pod_status_phase{phase="Pending"} == 1)
                  - record: cluster:container_restarts:rate5m
                    expr: |
                      sum(rate(kube_pod_container_status_restarts_total[5m]))
                  - record: cluster:cpu_throttling:percent
                    expr: |
                      (
                        sum(rate(container_cpu_cfs_throttled_periods_total{container!="", image!=""}[5m]))
                        /
                        clamp_min(sum(rate(container_cpu_cfs_periods_total{container!="", image!=""}[5m])), 1)
                      ) * 100
                  - record: namespace:deployment_availability:percent
                    expr: |
                      (
                        kube_deployment_status_replicas_available
                        /
                        clamp_min(kube_deployment_spec_replicas, 1)
                      ) * 100
                  - record: namespace:pvc_utilization:percent
                    expr: |
                      (
                        kubelet_volume_stats_used_bytes
                        /
                        clamp_min(kubelet_volume_stats_capacity_bytes, 1)
                      ) * 100
              - name: cluster-health-alerts
                interval: 30s
                rules:
                  - alert: CustomClusterPodCapacityHigh
                    expr: |
                      cluster:pod_capacity_utilization:percent > 85
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: Cluster pod capacity is high
                      description: Cluster pod capacity utilization is above 85% for 15 minutes.
                  - alert: CustomClusterPodsPendingHigh
                    expr: |
                      cluster:pods_pending:count > 10
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: Too many pods are pending
                      description: More than 10 pods are pending in the cluster for 15 minutes.
                  - alert: CustomClusterCPUThrottlingHigh
                    expr: |
                      cluster:cpu_throttling:percent > 25
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: Cluster CPU throttling is high
                      description: More than 25% of container CPU periods are throttled over 15 minutes.
                  - alert: CustomDeploymentAvailabilityDegraded
                    expr: |
                      namespace:deployment_availability:percent{namespace!~"kube-system|monitoring"} < 100
                        and on (namespace, deployment)
                      kube_deployment_spec_replicas > 0
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: Deployment availability is degraded
                      description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} is below desired replica availability for 15 minutes.
                  - alert: CustomPVCUsageHigh
                    expr: |
                      namespace:pvc_utilization:percent > 85
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: PVC utilization is high
                      description: PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 85% utilization for 15 minutes.

        # --- Alertmanager ---
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

        # --- Grafana with NLB + SSL ---
        grafana:
          adminPassword: {{ .Values.grafana.adminPassword | quote }}
          extraObjects:
            - |
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: grafana-branding-assets
              data:
                grafana_icon.svg: |
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
                    <title>Whiteforge Grafana Icon</title>
                    <defs>
                      <linearGradient id="wf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#111827"/>
                        <stop offset="100%" stop-color="#ea580c"/>
                      </linearGradient>
                    </defs>
                    <rect width="128" height="128" rx="28" fill="url(#wf-gradient)"/>
                    <path d="M28 28h18l10 38 8-20h18l8 20 10-38h18l-18 72H86L73 70 60 100H46L28 28z" fill="#f8fafc"/>
                  </svg>
                grafana_typelogo.svg: |
                  <svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72" role="img" aria-labelledby="title">
                    <title>Whiteforge</title>
                    <rect width="320" height="72" rx="16" fill="#111827"/>
                    <path d="M22 16h10l6 24 6-13h8l6 13 6-24h10L67 56H57L48 37l-9 19H29L22 16z" fill="#ea580c"/>
                    <text x="92" y="46" fill="#f8fafc" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">WHITEFORGE</text>
                  </svg>
              binaryData:
                fav32.png: {{ .Files.Get "assets/logo.png" | b64enc }}
                apple-touch-icon.png: {{ .Files.Get "assets/logo.png" | b64enc }}
          extraConfigmapMounts:
            - name: grafana-branding-icon
              mountPath: /usr/share/grafana/public/img/grafana_icon.svg
              subPath: grafana_icon.svg
              configMap: grafana-branding-assets
              readOnly: true
            - name: grafana-branding-typelogo
              mountPath: /usr/share/grafana/public/img/grafana_typelogo.svg
              subPath: grafana_typelogo.svg
              configMap: grafana-branding-assets
              readOnly: true
            - name: grafana-branding-favicon
              mountPath: /usr/share/grafana/public/img/fav32.png
              subPath: fav32.png
              configMap: grafana-branding-assets
              readOnly: true
            - name: grafana-branding-apple-touch-icon
              mountPath: /usr/share/grafana/public/img/apple-touch-icon.png
              subPath: apple-touch-icon.png
              configMap: grafana-branding-assets
              readOnly: true
          service:
            type: LoadBalancer
            port: 443
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
              service.beta.kubernetes.io/aws-load-balancer-type: external
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
              service.beta.kubernetes.io/aws-load-balancer-ssl-cert: {{ .Values.grafana.acmCertificateArn }}
              service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
              service.beta.kubernetes.io/aws-load-balancer-listen-ports: '[{"HTTPS":443}]'
              external-dns.alpha.kubernetes.io/hostname: grafana.shop.whiteforge.ai
          grafana.ini:
            server:
              root_url: https://grafana.shop.whiteforge.ai
          dashboardProviders:
            dashboardproviders.yaml:
