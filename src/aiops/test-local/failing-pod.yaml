---
apiVersion: v1
kind: Namespace
metadata:
  name: test-aiops
---
# Pod 1: CrashLoopBackOff — exits with error after printing error logs
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-app
  namespace: test-aiops
  labels:
    app: crashloop-app
    test: aiops-detection
spec:
  restartPolicy: Always
  containers:
    - name: crashloop
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "$(date) [ERROR] Application failed to connect to database at db:5432"
          echo "$(date) [ERROR] ConnectionRefusedError: Connection refused"
          echo "$(date) [CRITICAL] Health check failed: upstream service unavailable"
          echo "$(date) [ERROR] Retry 3/3 exhausted — shutting down"
          exit 1
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
---
# Pod 2: Failing liveness probe — will be restarted by kubelet
apiVersion: v1
kind: Pod
metadata:
  name: unhealthy-app
  namespace: test-aiops
  labels:
    app: unhealthy-app
    test: aiops-detection
spec:
  restartPolicy: Always
  containers:
    - name: unhealthy
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "$(date) [INFO] Starting unhealthy-app..."
          echo "$(date) [WARN] Memory pressure detected"
          echo "$(date) [ERROR] OOMKiller threshold breached, refusing new connections"
          # Keep running but health endpoint will fail
          while true; do
            echo "$(date) [ERROR] Service degraded — health check will fail"
            sleep 10
          done
      livenessProbe:
        exec:
          command: ["false"]
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 2
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
---
# Pod 3: Pending pod — requests more resources than available
apiVersion: v1
kind: Pod
metadata:
  name: pending-app
  namespace: test-aiops
  labels:
    app: pending-app
    test: aiops-detection
spec:
  containers:
    - name: pending
      image: busybox:1.36
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: "100"
          memory: 256Gi
---
# Pod 4: ImagePullBackOff — non-existent image
apiVersion: v1
kind: Pod
metadata:
  name: bad-image-app
  namespace: test-aiops
  labels:
    app: bad-image-app
    test: aiops-detection
spec:
  containers:
    - name: bad-image
      image: registry.example.com/nonexistent/app:v99.99
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
