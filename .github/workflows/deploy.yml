name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "terraform/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [staging, production, all]
        default: all

env:
  AWS_REGION: eu-central-1

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # STAGING
  # ---------------------------------------------------------------------------
  terraform-staging:
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: staging
      workspace: staging
      tfvars: envs/staging.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  deploy-staging:
    needs: [terraform-staging]
    if: >-
      github.event_name == 'push' ||
      inputs.environment == 'staging' ||
      inputs.environment == 'all'
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-staging.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-staging.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-staging.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-staging.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn: ${{ needs.terraform-staging.outputs.argocd_acm_certificate_arn }}
      hostname: origin-staging.shop.whiteforge.ai
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}

  # ---------------------------------------------------------------------------
  # PRODUCTION
  # ---------------------------------------------------------------------------
  terraform-production:
    needs: [deploy-staging]
    if: >-
      always() && !failure() && !cancelled() && (
        github.event_name == 'push' ||
        inputs.environment == 'production' ||
        inputs.environment == 'all'
      )
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: production
      workspace: production
      tfvars: envs/production.tfvars
      aws_region: eu-central-1
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  deploy-production:
    needs: [terraform-production]
    if: >-
      always() && !failure() && !cancelled() && (
        github.event_name == 'push' ||
        inputs.environment == 'production' ||
        inputs.environment == 'all'
      )
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      aws_region: eu-central-1
      cluster_name: ${{ needs.terraform-production.outputs.cluster_name }}
      vpc_id: ${{ needs.terraform-production.outputs.vpc_id }}
      lb_controller_role_arn: ${{ needs.terraform-production.outputs.lb_controller_role_arn }}
      origin_acm_certificate_arn: ${{ needs.terraform-production.outputs.origin_acm_certificate_arn }}
      argocd_acm_certificate_arn: ${{ needs.terraform-production.outputs.argocd_acm_certificate_arn }}
      hostname: origin.shop.whiteforge.ai
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
