<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout (template, menu)"
  th:replace="~{fragments/bare :: bare (~{::body})}"
>
  <body>
    <!-- Navigation -->
    <nav style="background: linear-gradient(180deg, #12121e 0%, #0e0e1a 100%); border-bottom: 2px solid rgba(184, 134, 11, 0.4);">
      <div class="max-w-5xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
          <a th:href="@{/}">
            <div class="flex items-center gap-3">
              <svg width="24" height="24" viewBox="0 0 100 100" style="fill: #daa520;">
                <path d="M50 15 L30 35 L5 30 L20 50 L5 70 L30 65 L50 85 L70 65 L95 70 L80 50 L95 30 L70 35 Z" opacity="0.9"/>
                <circle cx="50" cy="50" r="8"/>
              </svg>
              <span class="brand-text brand-lockup" aria-label="Warhammer AWS 40k">
                <span>Warhammer</span>
                <img
                  class="brand-aws-logo"
                  src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Amazon_Web_Services_Logo.svg/3840px-Amazon_Web_Services_Logo.svg.png"
                  alt="AWS"
                />
                <span>40k</span>
              </span>
            </div>
          </a>
          <div class="flex items-center space-x-10">
            <a
              id="menu-home"
              th:href="@{/}"
              class="hover:text-primary-500 transition duration-300 text-sm"
              style="color: #b8a88a;"
              th:text="#{nav.home}"
              >Sanctum</a
            >
            <a
              id="menu-catalog"
              th:href="@{/catalog}"
              class="hover:text-primary-500 transition duration-300 text-sm"
              style="color: #b8a88a;"
              th:text="#{nav.catalog}"
              >Armoury</a
            >
          </div>
          <div class="flex items-center">
            <a th:href="@{/cart}" id="go-cart">
              <button class="flex items-center gap-2 p-2 hover:text-primary-500" style="color: #b8a88a;">
                <i class="fas fa-scroll text-lg"></i>
                <span
                  class="text-xs rounded-full h-5 min-w-[1.25rem] flex items-center justify-center"
                  style="background: #b8860b; color: #fff;"
                  th:text="${cart.numItems}"
                >3</span>
              </button>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow" style="background-color: #0a0a12;">
      <th:block th:insert="${template}" />
    </main>
  </body>
</html>
